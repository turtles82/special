<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Edpuzzle Answers Script</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            margin-bottom: 0;
            margin-right: 0;
            cursor: pointer;
            font-weight: 400;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background-color: #ffe0e0;
            color: #d32f2f;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #d32f2f;
        }
        
        .error-message.show {
            display: block;
        }
        
        .info-text {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
            line-height: 1.6;
        }
        
        .info-text a {
            color: #667eea;
            text-decoration: none;
        }
        
        .info-text a:hover {
            text-decoration: underline;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .submit-btn.loading {
            position: relative;
            color: transparent;
        }
        
        .submit-btn.loading .loading-spinner {
            display: block;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>📝 Edpuzzle Answers</h1>
            <p>Web Version</p>
        </div>
        
        <form id="login-form">
            <div class="error-message" id="error-message"></div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="your@email.com" 
                    required
                    autocomplete="email"
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password" 
                    required
                    autocomplete="current-password"
                >
            </div>
            
            <div class="checkbox-group">
                <input 
                    type="checkbox" 
                    id="remember-device" 
                    name="remember-device"
                >
                <label for="remember-device">Remember this device</label>
            </div>
            
            <button type="submit" class="submit-btn" id="submit-btn">
                <span>Login</span>
                <div class="loading-spinner"></div>
            </button>
            
            <div class="info-text">
                <p>By logging in, you agree to our<br>
                <a href="/privacy" target="_blank">Privacy Policy</a> and 
                <a href="/terms" target="_blank">Terms of Service</a></p>
            </div>
        </form>
    </div>
    
    <script>
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberCheckbox = document.getElementById('remember-device');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');
        
        // Load saved email if device was remembered
        window.addEventListener('load', () => {
            const savedEmail = localStorage.getItem('edpuzzle_remembered_email');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberCheckbox.checked = true;
            }
        });
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous error
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';
            
            // Disable submit button and show loading
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const rememberDevice = rememberCheckbox.checked;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    // Save token to localStorage
                    localStorage.setItem('edpuzzle_auth_token', data.token);
                    
                    // Remember email if checkbox is checked
                    if (rememberDevice) {
                        localStorage.setItem('edpuzzle_remembered_email', email);
                    } else {
                        localStorage.removeItem('edpuzzle_remembered_email');
                    }
                    
                    // Save token expiry info
                    localStorage.setItem('edpuzzle_token_expires', data.expires_at || new Date(Date.now() + 24*60*60*1000).toISOString());
                    
                    // Redirect to dashboard
                    window.location.href = '/dashboard';
                } else {
                    // Show error message
                    const errorMsg = data.message || data.error || 'Login failed. Please check your credentials.';
                    errorMessage.textContent = errorMsg;
                    errorMessage.classList.add('show');
                    
                    // Re-enable submit button
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('loading');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('show');
                
                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
